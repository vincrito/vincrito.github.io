name: Rebuild Pagefind search index

on:
  push:
    branches: [main]
    paths-ignore:
      - '_pagefind/**'

jobs:
  pagefind:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Pagefind
        run: npx pagefind --site . --output-path _pagefind

      - name: Commit search index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _pagefind/
          git diff --staged --quiet || git commit -m "chore: rebuild Pagefind search index [skip ci]"
          git push
